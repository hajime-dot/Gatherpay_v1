<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華泰Gatherpay</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 15px; 
            max-width: 600px; 
            margin: 0 auto; 
            background-color: #f4f7f6;
            color: #333;
        }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 20px; }
        .section { margin-bottom: 20px; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        h3 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; font-size: 18px; }
        h4 { margin-top: 20px; margin-bottom: 10px; color: #34495e; font-size: 16px; border-bottom: 1px dashed #eee; padding-bottom: 5px; }
        
        input, select { 
            padding: 10px; 
            margin: 8px 0; 
            width: 100%; 
            box-sizing: border-box; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            font-size: 16px;
        }
        
        .check-item { 
            display: inline-block; 
            padding: 8px 12px; 
            margin: 4px; 
            border: 1px solid #bdc3c7; 
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 14px;
            background-color: #fff;
            transition: all 0.2s;
        }
        .check-item.checked { background-color: #3498db; color: white; border-color: #3498db; }
        
        button { border: none; border-radius: 6px; padding: 10px 15px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .btn-action { background: #ecf0f1; color: #333; margin-right: 5px; margin-bottom: 10px; border: 1px solid #bdc3c7;}
        .btn-action:hover { background: #e0e6e8; }
        .btn-submit { background: #27ae60; color: white; width: 100%; padding: 12px; margin-top: 10px; font-size: 16px; }
        .btn-whatsapp { background: #25D366; color: white; width: 100%; padding: 12px; font-size: 16px; margin-bottom: 15px;}
        .btn-danger { background: #e74c3c; color: white; width: 100%; padding: 12px; margin-top: 20px; }
        
        .history-row { padding: 12px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .history-row:last-child { border-bottom: none; }
        .delete-btn { color: #e74c3c; font-weight: bold; padding: 5px 10px; cursor: pointer; background: #ffeaea; border-radius: 6px; }
        
        .flex-row { display: flex; gap: 10px; }
        .flex-row > * { flex: 1; }
    </style>
</head>
<body>

    <h2>📍 華泰Gatherpay</h2>
    <div class="subtitle">多人記帳與結算系統</div>

    <div class="section" style="background: #e8f4f8; border: 1px solid #d4eaf2;">
        <h3 style="border-bottom: none; margin-bottom: 0;">📅 目前活動</h3>
        <select id="gathering-select" onchange="changeGathering(this.value)"></select>
        
        <div class="flex-row" style="margin-top: 10px;">
            <button class="btn-action" onclick="newGathering()">+ 建立新活動</button>
            <button class="btn-action" onclick="pullDebts()">📥 匯入上回結欠</button>
        </div>
    </div>

    <div class="section">
        <h3>新增消費</h3>
        <input type="text" id="m-desc" placeholder="項目 (例如: 晚餐)">
        
        <div style="display: flex; gap: 10px; align-items: center;">
            <select id="m-currency" style="width: 35%;" onchange="previewHKD()">
                <option value="HKD">HKD</option>
                <option value="JPY">JPY (日元)</option>
                <option value="TWD">TWD (台幣)</option>
                <option value="CNY">RMB (人民幣)</option>
            </select>
            <input type="number" id="m-amt" placeholder="金額" style="width: 65%;" onkeyup="previewHKD()">
        </div>
        <div id="rate-preview" style="font-size: 13px; color: #e67e22; margin-bottom: 10px; min-height: 18px;"></div>
        
        <select id="m-payer"></select>
        
        <div style="margin-top: 15px;">
            <b>分擔人:</b> <br><br>
            <button class="btn-action" onclick="toggleAllChecks(true)">全選</button>
            <button class="btn-action" onclick="toggleAllChecks(false)">全不選</button>
            <div id="m-targets"></div>
        </div>
        
        <button class="btn-submit" onclick="addExpense()">新增紀錄</button>
    </div>

    <div class="section">
        <h3>歷史紀錄</h3>
        <div id="history-list"></div>
    </div>

    <div class="section">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px;">
            <h3 style="border: none; padding: 0; margin: 0;">💰 結算清單</h3>
            <select id="settle-currency" style="width: auto; margin: 0; padding: 5px; font-size: 14px;" onchange="updateMoneyUI()">
                <option value="HKD">顯示為: HKD</option>
                <option value="JPY">顯示為: JPY</option>
                <option value="TWD">顯示為: TWD</option>
                <option value="CNY">顯示為: RMB</option>
            </select>
        </div>
        
        <h4>個人結餘 (正數為應收款)</h4>
        <div id="balance-list" style="margin-bottom: 20px;"></div>
        
        <h4>最終結算建議</h4>
        <div id="resolve-list" style="margin-bottom: 20px; line-height: 1.8; font-size: 15px;"></div>
        
        <button class="btn-whatsapp" onclick="shareSettlement()">WhatsApp 分享此清單</button>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 25px 0;">
        <button class="btn-danger" onclick="clearCurrentGatheringData()">⚠️ 清除「目前活動」的數據</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // === 1. Firebase Configuration ===
        const firebaseConfig = {
            apiKey: "AIzaSyDrZTdCk-m24XLtI8NyaE5kLzE4tB7MlEM",
            authDomain: "gatherpay-5f59b.firebaseapp.com",
            databaseURL: "https://gatherpay-5f59b-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "gatherpay-5f59b",
            storageBucket: "gatherpay-5f59b.firebasestorage.app",
            messagingSenderId: "827437997271",
            appId: "1:827437997271:web:f2ef02c6385ffda0f5e492"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // === 2. Global Variables ===
        const members = [
            "水", "柏", "舊", "輝", "鏗", "琳", "JOVI", "吹", 
            "邦", "BOYI", "鳳", "如", "ERICA", "SOPO", "琪", "SEAN", "健"
        ]; 
        
        let allGatherings = [];
        let currentGathering = localStorage.getItem('lastGathering') || "預設活動";
        let expenses = [];
        let unsubscribe = null;
        
        // Exchange Rates (Fallback values, updated on init)
        let exchangeRates = { HKD: 1, JPY: 19.5, TWD: 4.1, CNY: 0.92 };

        // --- App Init ---
        async function init() {
            await fetchRates();
            setupMoneyUI();

            // Listen to Gathering List
            onValue(ref(db, 'huatai_gatherpay/gathering_list'), (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    allGatherings = Object.values(data);
                } else {
                    allGatherings = ["預設活動"];
                    set(ref(db, 'huatai_gatherpay/gathering_list'), allGatherings);
                }

                if (!allGatherings.includes(currentGathering)) {
                    currentGathering = allGatherings[0];
                }

                renderGatheringSelect();
                listenToExpenses(currentGathering);
            });
        }
        
        // --- Fetch Live Exchange Rates ---
        async function fetchRates() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/HKD');
                const data = await res.json();
                if(data && data.rates) {
                    exchangeRates.JPY = data.rates.JPY;
                    exchangeRates.TWD = data.rates.TWD;
                    exchangeRates.CNY = data.rates.CNY;
                }
            } catch (e) {
                console.warn("API 獲取匯率失敗，將使用系統預設匯率。");
            }
        }

        // --- UI Interactions ---
        window.previewHKD = function() {
            const curr = document.getElementById('m-currency').value;
            const amt = parseFloat(document.getElementById('m-amt').value);
            const previewDiv = document.getElementById('rate-preview');
            
            if (isNaN(amt) || curr === 'HKD') {
                previewDiv.innerHTML = '';
                return;
            }
            
            const rate = exchangeRates[curr];
            const hkdAmt = amt / rate;
            previewDiv.innerHTML = `🔄 實時匯率: 1 HKD = ${rate.toFixed(4)} ${curr === 'CNY' ? 'RMB' : curr} (折合約 <b>HK$${hkdAmt.toFixed(1)}</b>)`;
        }

        // --- Event/Gathering Management ---
        function renderGatheringSelect() {
            const select = document.getElementById('gathering-select');
            select.innerHTML = '';
            allGatherings.forEach(g => {
                select.innerHTML += `<option value="${g}" ${g === currentGathering ? 'selected' : ''}>${g}</option>`;
            });
        }

        window.changeGathering = function(name) {
            currentGathering = name;
            localStorage.setItem('lastGathering', name);
            listenToExpenses(name);
        }

        window.newGathering = function() {
            const name = prompt('請輸入新活動名稱 (例如: 2026-05 船河):');
            if (name && name.trim() !== '') {
                if (!allGatherings.includes(name)) {
                    allGatherings.push(name);
                    set(ref(db, 'huatai_gatherpay/gathering_list'), allGatherings);
                    changeGathering(name);
                } else {
                    alert('此活動名稱已存在，將為您切換至該活動。');
                    changeGathering(name);
                }
            }
        }

        function listenToExpenses(gatheringName) {
            if (unsubscribe) unsubscribe(); 
            
            const dataRef = ref(db, `huatai_gatherpay/gatherings/${gatheringName}/expenses`);
            unsubscribe = onValue(dataRef, (snapshot) => {
                const data = snapshot.val();
                expenses = data ? Object.values(data) : [];
                expenses.sort((a, b) => b.id - a.id);
                updateMoneyUI();
            });
        }

        // --- Money UI Setup ---
        function setupMoneyUI() {
            const sel = document.getElementById('m-payer');
            const box = document.getElementById('m-targets');
            if(!sel || !box) return;

            sel.innerHTML = '<option>請選擇付款人...</option>';
            box.innerHTML = '';
            
            members.forEach(m => {
                sel.innerHTML += `<option value="${m}">${m}</option>`;
                box.innerHTML += `<div class="check-item checked" data-name="${m}" onclick="this.classList.toggle('checked')">${m}</div>`;
            });
        }

        window.toggleAllChecks = function(isCheck) {
            document.querySelectorAll('.check-item').forEach(el => {
                isCheck ? el.classList.add('checked') : el.classList.remove('checked');
            });
        }

        window.addExpense = function() {
            const desc = document.getElementById('m-desc').value;
            const originalAmt = parseFloat(document.getElementById('m-amt').value);
            const currency = document.getElementById('m-currency').value;
            const payer = document.getElementById('m-payer').value;
            const targets = Array.from(document.querySelectorAll('.check-item.checked')).map(e => e.dataset.name);
            
            if(!desc || isNaN(originalAmt) || payer === '請選擇付款人...') return alert('請填寫完整項目、金額及付款人');
            if(targets.length === 0) return alert('請至少選擇一人分擔');

            let rate = 1;
            let hkdAmt = originalAmt;
            if (currency !== 'HKD') {
                rate = exchangeRates[currency];
                hkdAmt = originalAmt / rate;
            }

            const newId = Date.now();
            const newExpense = { 
                id: newId, 
                desc, 
                amt: hkdAmt, 
                originalAmt, 
                currency: currency === 'CNY' ? 'RMB' : currency, 
                rate, 
                payer, 
                targets 
            };

            set(ref(db, `huatai_gatherpay/gatherings/${currentGathering}/expenses/${newId}`), newExpense);

            document.getElementById('m-desc').value = '';
            document.getElementById('m-amt').value = '';
            document.getElementById('rate-preview').innerHTML = '';
        }

        window.delExp = (id) => {
            if(confirm('確定要刪除這筆紀錄嗎?')) {
                set(ref(db, `huatai_gatherpay/gatherings/${currentGathering}/expenses/${id}`), null);
            }
        };

        window.clearCurrentGatheringData = function() {
            if(confirm(`⚠️ 警告：這會永久清除「${currentGathering}」的所有記帳數據！確定要繼續嗎？`)) {
                set(ref(db, `huatai_gatherpay/gatherings/${currentGathering}/expenses`), null);
            }
        }

        // --- Pull Previous Debts ---
        window.pullDebts = async function() {
            let promptText = `請輸入要匯入欠款的「上一次活動名稱」:\n(目前存在的活動: ${allGatherings.join(', ')})`;
            const prev = prompt(promptText);
            
            if(!prev || !allGatherings.includes(prev)) return alert('無效的活動名稱或已取消操作。');
            if(prev === currentGathering) return alert('不能匯入目前正在進行的活動數據。');
            
            const snap = await get(ref(db, `huatai_gatherpay/gatherings/${prev}/expenses`));
            const prevExp = snap.val() ? Object.values(snap.val()) : [];
            
            if (prevExp.length === 0) return alert('該活動沒有任何消費紀錄！');

            let bals = {}; 
            members.forEach(m => bals[m] = 0);
            
            prevExp.forEach(e => {
                if(bals.hasOwnProperty(e.payer)) bals[e.payer] += e.amt;
                const split = e.amt / e.targets.length;
                e.targets.forEach(t => { if(bals.hasOwnProperty(t)) bals[t] -= split; });
            });

            let coupleSum = (bals['琪'] || 0) + (bals['SEAN'] || 0);
            let resolveList = [];
            Object.keys(bals).forEach(m => {
                if(m !== '琪' && m !== 'SEAN') resolveList.push({ name: m, val: bals[m] });
            });
            resolveList.push({ name: '琪 & SEAN ❤️', val: coupleSum });

            let debtors = resolveList.filter(x => x.val < -0.1).sort((a,b) => a.val - b.val);
            let creditors = resolveList.filter(x => x.val > 0.1).sort((a,b) => b.val - a.val);

            let newExpenses = [];
            
            debtors.forEach(d => {
                let debtAmt = Math.abs(d.val);
                creditors.forEach(c => {
                    if(debtAmt < 0.1 || c.val < 0.1) return;
                    let settle = Math.min(debtAmt, c.val);
                    
                    let realTargets = d.name === '琪 & SEAN ❤️' ? ['琪', 'SEAN'] : [d.name];
                    let creditorName = c.name === '琪 & SEAN ❤️' ? '琪' : c.name; 
                    
                    newExpenses.push({
                        id: Date.now() + Math.floor(Math.random() * 1000),
                        desc: `📌 結欠匯入 (${prev})`,
                        amt: settle,
                        originalAmt: settle,
                        currency: 'HKD',
                        rate: 1,
                        payer: creditorName,
                        targets: realTargets
                    });
                    
                    debtAmt -= settle;
                    c.val -= settle;
                });
            });

            if(newExpenses.length === 0) {
                return alert('該活動已經全部結清，沒有任何人有欠款！');
            }

            if (confirm(`找到 ${newExpenses.length} 筆結欠紀錄，準備匯入至「${currentGathering}」。確定嗎？`)) {
                newExpenses.forEach(exp => {
                    set(ref(db, `huatai_gatherpay/gatherings/${currentGathering}/expenses/${exp.id}`), exp);
                });
                alert('✅ 成功匯入欠款紀錄！');
            }
        }

        // --- Render UI (History, Balance, Settlement) ---
        window.updateMoneyUI = function() {
            const list = document.getElementById('history-list');
            const balDiv = document.getElementById('balance-list');
            const resolveDiv = document.getElementById('resolve-list');
            if(!list || !balDiv || !resolveDiv) return;

            // Settlement Display Currency config
            const displayCurr = document.getElementById('settle-currency').value || 'HKD';
            const displayRate = exchangeRates[displayCurr] || 1;
            const displaySymbol = displayCurr === 'CNY' ? 'RMB' : displayCurr;
            const prefix = displaySymbol === 'HKD' ? 'HK$' : displaySymbol + ' ';

            list.innerHTML = '';
            balDiv.innerHTML = '';
            resolveDiv.innerHTML = '';

            let bals = {}; 
            members.forEach(m => bals[m] = 0);
            
            if (expenses.length === 0) {
                list.innerHTML = '<div style="color: #999; text-align: center; padding: 10px;">目前尚無消費紀錄</div>';
            }

            expenses.forEach(e => {
                // Background Math is always HKD
                if(bals.hasOwnProperty(e.payer)) bals[e.payer] += e.amt;
                const split = e.amt / e.targets.length;
                e.targets.forEach(t => { if(bals.hasOwnProperty(t)) bals[t] -= split; });
                
                let currencyInfo = '';
                if (e.currency && e.currency !== 'HKD') {
                    currencyInfo = `<br><span style="color:#95a5a6; font-size: 12px;">(原幣: ${e.currency} ${e.originalAmt} @ 匯率 ${e.rate.toFixed(4)})</span>`;
                }

                list.innerHTML += `
                    <div class="history-row">
                        <div style="font-size:14px; line-height: 1.4;">
                            <b>${e.desc}</b> <br>
                            <span style="color:#27ae60; font-weight:bold;">HK$${e.amt.toFixed(1)}</span> 
                            <span style="color:#7f8c8d; font-size: 12px;">(付款: ${e.payer})</span>
                            ${currencyInfo}
                        </div>
                        <div class="delete-btn" onclick="delExp(${e.id})">刪除</div>
                    </div>`;
            });

            // Resolve Debts (Merge 琪 & SEAN)
            let resolveList = [];
            let coupleSum = (bals['琪'] || 0) + (bals['SEAN'] || 0);

            Object.keys(bals).forEach(m => {
                if(m !== '琪' && m !== 'SEAN') {
                    resolveList.push({ name: m, val: bals[m] });
                }
            });
            resolveList.push({ name: '琪 & SEAN ❤️', val: coupleSum });

            // Render Balance with Selected Display Currency
            resolveList.sort((a,b) => b.val - a.val).forEach(item => {
                let convertedVal = item.val * displayRate;
                if(Math.abs(convertedVal) < 0.1) return;
                const color = convertedVal > 0 ? '#27AE60' : '#e74c3c';
                balDiv.innerHTML += `
                    <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #f9f9f9; font-size:14px;">
                        <span>${item.name}</span>
                        <span style="color:${color}; font-weight:bold;">${convertedVal > 0 ? '+' : ''}${prefix}${convertedVal.toFixed(1)}</span>
                    </div>`;
            });

            // Debt Resolver Algorithm with Selected Display Currency
            let debtors = resolveList.filter(x => x.val < -0.1).sort((a,b) => a.val - b.val);
            let creditors = resolveList.filter(x => x.val > 0.1).sort((a,b) => b.val - a.val);

            if(debtors.length === 0) {
                resolveDiv.innerHTML = "🎉 太棒了，目前沒有任何欠款！";
            } else {
                debtors.forEach(d => {
                    let debtAmt = Math.abs(d.val);
                    creditors.forEach(c => {
                        if(debtAmt < 0.1 || c.val < 0.1) return;
                        let settle = Math.min(debtAmt, c.val);
                        
                        let convertedSettle = settle * displayRate;
                        
                        resolveDiv.innerHTML += `➡️ <b>${d.name}</b> 需支付 <span style="color:#e74c3c; font-weight:bold;">${prefix}${convertedSettle.toFixed(1)}</span> 給 <b>${c.name}</b><br>`;
                        
                        debtAmt -= settle;
                        c.val -= settle;
                    });
                });
            }
        }

        window.shareSettlement = function() {
            const div = document.getElementById('resolve-list');
            let content = div.innerText;
            if (!content || content.includes("目前沒有任何欠款")) return alert("無欠款紀錄可分享");
            let report = `📊 *[華泰Gatherpay - ${currentGathering} 結算單]*\n\n${content}\n\n大家記得 PayMe / FPS / 轉數快啦！💸`;
            window.open(`https://wa.me/?text=${encodeURIComponent(report)}`, '_blank');
        }

        // Boot up
        init();
    </script>
</body>
</html>
