<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    console.log("🚀 App starting...");

    // ==========================================
    // PASTE YOUR FIREBASE CONFIG BELOW
    // Ensure every line has a comma at the end!
    // ==========================================
// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyDrZTdCk-m24XLtI8NyaE5kLzE4tB7MlEM",
  authDomain: "gatherpay-5f59b.firebaseapp.com",
  databaseURL: "https://gatherpay-5f59b-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "gatherpay-5f59b",
  storageBucket: "gatherpay-5f59b.firebasestorage.app",
  messagingSenderId: "827437997271",
  appId: "1:827437997271:web:f2ef02c6385ffda0f5e492"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
    };

    try {
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dataRef = ref(db, 'gatherPayData');
        console.log("✅ Firebase Connected!");

        window.appData = { gatherings: {} };
        window.currentGatheringId = null;

        // Sync with Firebase
        onValue(dataRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                window.appData = data;
                renderGatheringDropdown();
                if(window.currentGatheringId) window.updateUI();
            }
            console.log("☁️ Data synced from cloud");
        });

        window.saveData = () => set(dataRef, window.appData);

        // ATTACH FUNCTIONS TO WINDOW (So buttons can see them)
        window.createNewGathering = () => {
            console.log("Button clicked: Create New");
            const name = document.getElementById('newGatheringName').value;
            if(!name) return;
            const id = 'g_' + Date.now();
            if(!window.appData.gatherings) window.appData.gatherings = {};
            window.appData.gatherings[id] = { name, date: new Date().toLocaleDateString(), expenses: [] };
            window.currentGatheringId = id;
            window.saveData();
            document.getElementById('newGatheringName').value = '';
        };

        window.loadGathering = () => {
            window.currentGatheringId = document.getElementById('gatheringSelect').value;
            window.updateUI();
        };

        window.addExpense = () => {
            const name = document.getElementById('itemName').value;
            const cost = parseFloat(document.getElementById('itemCost').value);
            const whoPaid = document.getElementById('whoPaid').value.trim();
            const whoShares = document.getElementById('whoShares').value.trim();
            if (!name || !cost || !whoPaid || !whoShares) return alert("Fill all fields");

            if(!window.appData.gatherings[window.currentGatheringId].expenses) 
                window.appData.gatherings[window.currentGatheringId].expenses = [];

            window.appData.gatherings[window.currentGatheringId].expenses.push({ name, cost, whoPaid, whoShares });
            document.getElementById('itemName').value = '';
            document.getElementById('itemCost').value = '';
            window.saveData();
        };

        // ... Keep the rest of your updateUI and renderGatheringDropdown functions here ...
        // Just make sure they start with "window.functionName = () => {"
        
    } catch (error) {
        console.error("❌ CRITICAL ERROR DURING BOOT:", error);
    }

    function renderGatheringDropdown() {
        const select = document.getElementById('gatheringSelect');
        if(!select) return;
        const current = select.value;
        select.innerHTML = '<option value="">-- Choose Gathering --</option>';
        const gs = window.appData.gatherings || {};
        Object.keys(gs).forEach(id => {
            const opt = document.createElement('option');
            opt.value = id;
            opt.textContent = `${gs[id].name} (${gs[id].date})`;
            if(id === current) opt.selected = true;
            select.appendChild(opt);
        });
    }
</script>
